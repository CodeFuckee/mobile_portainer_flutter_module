stages:
  - analyze
  - build
  - selenium

variables:
  FLUTTER_IMAGE: docker.1ms/cirrusci/flutter:stable
  # 禁止 GitLab Runner 的 git clean，因为 .ohos 构建产物路径超过 Windows MAX_PATH (260)
  # 改用 before_script 中的 PowerShell 清理（能正确处理长路径）
  GIT_CLEAN_FLAGS: none
  # 以下路径变量不在 YAML 中硬编码，优先从 Runner config.toml 的 environment 或
  # GitLab 项目 Settings → CI/CD → Variables 读取。before_script 中的 foreach
  # 会自动检测常见路径作为兜底。
  # FLUTTER_ROOT: Flutter SDK 根目录，例如 D:\Path\flutter
  # HOS_SDK_HOME: HarmonyOS SDK 目录，例如 D:\Program Files\Huawei\DevEco Studio\sdk

# Shell executor 公共配置：UTF-8 编码修复 + Flutter PATH 自动检测
.shell_setup:
  before_script:
    - |
      # 清理构建产物（替代 git clean，因 .ohos 长路径超过 Windows MAX_PATH 260 字符限制）
      $dirsToClean = @("$CI_PROJECT_DIR\.dart_tool", "$CI_PROJECT_DIR\build", "$CI_PROJECT_DIR\.android", "$CI_PROJECT_DIR\.ios", "$CI_PROJECT_DIR\.ohos", "$CI_PROJECT_DIR\macos\Flutter\ephemeral")
      foreach ($d in $dirsToClean) { if (Test-Path $d) { cmd /c "rmdir /s /q `"\\?\$d`"" 2>$null } }
      $filesToClean = @("$CI_PROJECT_DIR\.flutter-plugins-dependencies")
      foreach ($f in $filesToClean) { if (Test-Path $f) { Remove-Item -Path $f -Force -ErrorAction SilentlyContinue } }
      chcp.com 65001 2>$null
      [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
      $OutputEncoding = [System.Text.Encoding]::UTF8
      $env:PUB_HOSTED_URL = "https://pub.flutter-io.cn"
      $env:FLUTTER_STORAGE_BASE_URL = "https://storage.flutter-io.cn"
      git config --global --add safe.directory "$CI_PROJECT_DIR"
      foreach ($p in @($env:FLUTTER_ROOT, 'C:\flutter', "$env:USERPROFILE\flutter", "$env:USERPROFILE\fvm\default")) { if ($p -and (Test-Path "$p\bin\flutter.bat")) { $env:Path = "$p\bin;$env:Path"; git config --global --add safe.directory $p; break } }
      # 设置 HarmonyOS/OpenHarmony SDK 路径，Flutter ohos 分支要求通过 config 或特定目录结构校验
      foreach ($p in @($env:OHOS_SDK_HOME, $env:OHOS_HOME, $env:HOS_SDK_HOME)) { if ($p -and (Test-Path $p)) { flutter config --ohos-sdk $p; break } }
      # hvigor 不支持路径中有空格。设置 HVIGOR_USER_HOME 到无空格路径
      if (-not (Test-Path 'C:\hvigor_home')) { New-Item -ItemType Directory -Path 'C:\hvigor_home' -Force *>$null }
      $env:HVIGOR_USER_HOME = 'C:\hvigor_home'
      # 下载 Portable Node.js 到 D:\nodejs（无空格），绕过 D:\Program Files\nodejs 的空格问题。
      # 仅检查 npm.cmd 存在还不够 —— 之前的构建运行 `npm install` 在 D:\nodejs
      # 可能损坏了 node_modules\npm\ 内部文件（如 npm-prefix.js）。
      # 直接检查关键文件是否存在来判断 npm 是否健康。
      if (-not (Test-Path 'D:\nodejs\node_modules\npm\bin\npm-prefix.js')) {
        Write-Host 'Node.js installation broken or missing, re-downloading...'
        Remove-Item -Path 'D:\nodejs' -Recurse -Force -ErrorAction SilentlyContinue
        $ProgressPreference = 'SilentlyContinue'
        $nodeZip = "$env:TEMP\node-portable.zip"
        $nodeExtract = "$env:TEMP\node-extract"
        Remove-Item -Path $nodeExtract -Recurse -Force -ErrorAction SilentlyContinue
        Invoke-WebRequest -Uri 'https://npmmirror.com/mirrors/node/v20.18.0/node-v20.18.0-win-x64.zip' -OutFile $nodeZip
        Expand-Archive -Path $nodeZip -DestinationPath $nodeExtract -Force
        $innerDir = Get-ChildItem -Path $nodeExtract -Directory | Select-Object -First 1
        Remove-Item -Path 'D:\nodejs' -Recurse -Force -ErrorAction SilentlyContinue
        Move-Item -Path $innerDir.FullName -Destination 'D:\nodejs'
        Remove-Item $nodeZip -Force -ErrorAction SilentlyContinue
        Remove-Item $nodeExtract -Recurse -Force -ErrorAction SilentlyContinue
        Write-Host 'Portable Node.js installed to D:\nodejs'
      }
      # 显式设置 NODE_HOME，确保 hvigor 使用 D:\nodejs（无空格），同时配置 npm 国内镜像
      $env:NODE_HOME = 'D:\nodejs'
      $env:Path = "D:\nodejs;$env:Path"
      # 通过环境变量设置 npm registry（hvigor 子进程继承 env 变量，无需依赖 .npmrc 文件）
      $env:npm_config_registry = "https://registry.npmmirror.com"
      # 同时持久化到 .npmrc 作为兜底
      npm config set registry https://registry.npmmirror.com
      # 清理 npm 缓存，避免 SYSTEM 账户缓存损坏导致 npm 子进程静默失败
      npm cache clean --force 2>$null
      Write-Host "Node.js at D:\nodejs, npm registry: https://registry.npmmirror.com"
      # hvigor 构建启动时会通过 npm install pnpm@10.28.2 安装 pnpm。
      # 由于 hvigor 作为 Flutter 子进程运行时环境变量（PATH 被 _buildOhosEnvironment() 替换）
      # 可能与 before_script 不同，导致 npm 调用静默失败（No stdout output）。
      # 策略：在 hvigor 的 pnpm 安装目录预装精确版本，让 hvigor 发现已有匹配版本而跳过安装。
      #
      # 关键：getHvigorUserHomeCacheDir() 当 HVIGOR_USER_HOME 已设置时，直接将其作为
      # 根目录（不再追加 .hvigor）。因此 tools 路径是 HVIGOR_USER_HOME/wrapper/tools，
      # 而不是 HVIGOR_USER_HOME/.hvigor/wrapper/tools！
      #
      # 注意：千万不能在 D:\nodejs 内运行 npm install —— 那会损坏 Node.js 自带的
      # npm 包（D:\nodejs\node_modules\npm\），导致 npm 彻底不可用！
      Write-Host "Pre-installing pnpm@10.28.2 for hvigor wrapper..."
      # HVIGOR_USER_HOME 被当作根目录直接使用，不追加 .hvigor
      $hvigorToolsDir = "$env:HVIGOR_USER_HOME\wrapper\tools"
      New-Item -ItemType Directory -Path $hvigorToolsDir -Force -ErrorAction SilentlyContinue *>$null
      Push-Location $hvigorToolsDir
      try {
        npm install pnpm@10.28.2 --no-save --no-audit --no-fund 2>&1
        if ($LASTEXITCODE -ne 0) { Write-Error "pnpm pre-install failed"; exit 1 }
        Write-Host "pnpm pre-installed at: $hvigorToolsDir"
      } finally {
        Pop-Location
      }
      # 备选：SYSTEM 默认 home 目录（当 HVIGOR_USER_HOME 未设置时，hvigor 使用 ~/.hvigor）
      if ($env:USERPROFILE -and ($env:USERPROFILE -ne $env:HVIGOR_USER_HOME)) {
        $systemHvigorToolsDir = "$env:USERPROFILE\.hvigor\wrapper\tools"
        New-Item -ItemType Directory -Path $systemHvigorToolsDir -Force -ErrorAction SilentlyContinue *>$null
        Push-Location $systemHvigorToolsDir
        try {
          npm install pnpm@10.28.2 --no-save --no-audit --no-fund 2>&1
          Write-Host "pnpm also installed at: $systemHvigorToolsDir"
        } finally {
          Pop-Location
        }
      }

flutter_analyze:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: analyze
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter analyze --no-fatal-warnings --no-fatal-infos
    - flutter test

flutter_build_web:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: build
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter build web
  artifacts:
    paths:
      - build/web
    expire_in: 1 day

# HarmonyOS HAR 构建需要 HarmonyOS SDK 和 DevEco Studio 工具链。
# Runner 需安装以下环境：
#   1. HarmonyOS SDK（通过 DevEco Studio 或命令行安装）
#   2. Node.js >= 18（hvigor 构建工具依赖）
#   3. ohpm（HarmonyOS 包管理器）
# 推荐为此作业配置独立的 shell executor runner 并打上 ohos 标签。
flutter_build_har:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: build
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter build har --release

selenium_tests:
  stage: selenium
  tags:
    - linux
    - docker
  # 构建、mock 后端、Selenium 测试全部在 Docker 内完成，无需依赖外部 artifacts
  script:
    # 提前创建报告目录，确保宿主机 mount 权限正确
    - mkdir -p selenium_tests/reports
    - docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
  artifacts:
    when: always
    paths:
      - selenium_tests/reports/report.html
    expire_in: 7 days
