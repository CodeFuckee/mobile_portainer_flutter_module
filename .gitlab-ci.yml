stages:
  - check
  - pretest
  - test
  - build
  - deploy

variables:
  GIT_CLEAN_FLAGS: none

  # ================================================================
  # 路径变量 —— 可在 GitLab UI / Runner config.toml 中覆盖默认值。
  # ================================================================
  HVIGOR_USER_HOME: 'C:\hvigor_home'
  NODEJS_HOME: 'D:\nodejs'
  # FLUTTER_ROOT: Flutter SDK 根目录（可选，Runner 上 Flutter 已在 PATH 时无需设置）
  HOS_SDK_HOME: '/home/ckd/hos-sdk'

  # ================================================================
  # 镜像 / 注册表地址
  # ================================================================
  NODEJS_VERSION: 'v20.18.0'
  NODEJS_DOWNLOAD_URL: 'https://npmmirror.com/mirrors/node'
  PUB_HOSTED_URL: 'https://pub.flutter-io.cn'
  FLUTTER_STORAGE_BASE_URL: 'https://storage.flutter-io.cn'
  NPM_REGISTRY_URL: 'https://registry.npmmirror.com'

  # ================================================================
  # 行为开关
  # ================================================================
  HVIGOR_USER_HOME_AUTO_CREATE: 'true'
  NODEJS_AUTO_INSTALL: 'true'

  # ================================================================
  # 部署变量
  # ================================================================
  DEPLOY_CONTAINER_NAME: 'mobile-portainer-web'
  DEPLOY_API_CONTAINER_NAME: 'mobile-portainer-api'
  DEPLOY_API_IMAGE: 'mobile_portainer-api:latest'
  DEPLOY_PORT: '8080'
  DEPLOY_NETWORK: 'mobile_portainer_default'

# ================================================================
# 公共配置 —— 命令同时兼容 bash 和 PowerShell 5.1
# Runner 需确保 Flutter 在 PATH 中，或通过 GitLab Variables 设置 FLUTTER_ROOT
# ================================================================
.setup:
  before_script:
    - |
      set +e
      git config --global --add safe.directory "$CI_PROJECT_DIR"
      echo "CI env: PUB_HOSTED_URL = $PUB_HOSTED_URL"
      export HOS_SDK_HOME="${HOS_SDK_HOME:-/home/ckd/hos-sdk}"
      export PATH="$HOME/flutter/bin:$HOME/fvm/default/bin:/usr/local/flutter/bin:$PATH"; echo "PATH setup done"

# ================================================================
# flutter_analyze
# ================================================================
flutter_analyze:
  extends: .setup
  stage: check
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter analyze --no-fatal-warnings --no-fatal-infos
    - flutter test

# ================================================================
# flutter_build_web（pretest：为 Selenium 和部署提供 web 构建产物）
# ================================================================
flutter_build_web:
  extends: .setup
  stage: pretest
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter build web --no-tree-shake-icons
  artifacts:
    paths:
      - build/web
    expire_in: 1 day

# ================================================================
# selenium_tests
# ================================================================
selenium_tests:
  stage: test
  timeout: 30m
  tags:
    - linux
    - docker
    - selenium
  needs:
    - job: flutter_build_web
      artifacts: true
    - job: flutter_analyze
  script:
    # 所有 Docker 命令的输出重定向到 /tmp 文件，而非 GitLab Runner trace。
    # 原因：Runner 19.1.1 的 shell executor 在捕获大量 Docker 输出时
    # 存在 trace 缓冲区死锁 bug，导致 job 在 ~12 秒时被杀。
    # 仅保留 echo 里程碑输出给 trace 查看进度。
    - echo "step0 start"
    - docker --version
    - echo "step0.1 docker diagnostics"
    - docker images --format '{{.Repository}}:{{.Tag}}' 2>/dev/null | sort
    - echo "DOCKER_HOST=$DOCKER_HOST"
    - echo "step1 verify"
    - ls -la build/web/index.html
    - echo "step2 cleanup"
    - docker rm -f selenium_app 2>/dev/null || true
    - echo "step3 build app image (docker commit 方案)"
    - docker rm -f tmp_app tmp_test 2>/dev/null || true
    - |
      echo "  -> 创建临时容器..."
      docker run --name tmp_app -d docker.1ms.run/python:3.11-slim sleep 3600
      echo "  -> 创建目录并复制文件..."
      docker exec tmp_app mkdir -p /app/build/web /app/selenium_tests
      docker cp build/web/. tmp_app:/app/build/web/
      docker cp selenium_tests/mock_backend.py tmp_app:/app/selenium_tests/
      echo "  -> 提交为 selenium_app 镜像..."
      docker commit --change='WORKDIR /app' --change='EXPOSE 9000' --change='CMD ["python", "selenium_tests/mock_backend.py"]' tmp_app selenium_app:latest
      docker rm -f tmp_app
    - echo "step3 done"
    - echo "step4 build test image (docker commit 方案)"
    - |
      echo "  -> 创建临时容器..."
      docker run --name tmp_test -d docker.1ms.run/python:3.11-slim sleep 3600
      echo "  -> 安装 Chromium 及依赖库（约 2-3 分钟）..."
      docker exec tmp_test sh -c "sed -i 's|http://deb.debian.org|http://mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list.d/debian.sources && apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends chromium chromium-driver libegl1-mesa libgles2-mesa libgl1-mesa-glx libgl1-mesa-dri libgbm1 libdrm2 libxkbcommon0 libnss3 libnspr4 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcups2 libpango-1.0-0 libasound2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 fonts-liberation libvulkan1 mesa-vulkan-drivers && rm -rf /var/lib/apt/lists/*"
      echo "  -> 复制测试代码..."
      docker exec tmp_test mkdir -p /app
      docker cp selenium_tests/. tmp_test:/app/
      echo "  -> 安装 Python 依赖..."
      docker exec tmp_test sh -c "PIP_PROGRESS_BAR=off pip install --quiet --no-cache-dir -i https://pypi.tuna.tsinghua.edu.cn/simple selenium pytest webdriver-manager pytest-html"
      echo "  -> 提交为 selenium_tests 镜像..."
      docker commit --change='WORKDIR /app' --change='ENV WDM_PROGRESS_BAR=0' tmp_test selenium_tests:latest
      docker rm -f tmp_test
    - echo "step4 done"
    - echo "step5 up app"
    - docker rm -f selenium_app 2>/dev/null || true
    - docker run -d --name selenium_app -p 9000:9000 selenium_app
    - echo "step6 wait (up to 30s)"
    - for i in $(seq 1 30); do curl -sf http://localhost:9000/info > /dev/null 2>&1 && echo "app ready at ${i}s" && break; test $i -eq 30 && echo "TIMEOUT" && exit 1; sleep 1; done
    - echo "step7 run tests"
    - mkdir -p selenium_tests/reports
    - docker run --rm --shm-size=2g --network container:selenium_app -v $CI_PROJECT_DIR/selenium_tests/reports:/app/reports -e TEST_BASE_URL=http://localhost:9000 -e MOCK_BACKEND_URL=http://localhost:9000 -e TEST_BROWSER=chrome -e TEST_HEADLESS=true -e CHROMIUM_BINARY=/usr/bin/chromium -e CHROMEDRIVER_PATH=/usr/bin/chromedriver selenium_tests sh -c "pytest tests/ -v --tb=long --html=reports/report.html --self-contained-html"
    - echo "step7 cleanup"
    - docker stop selenium_app 2>/dev/null || true
    - docker rm selenium_app 2>/dev/null || true
    - echo "step8 done"
  artifacts:
    when: always
    paths:
      - selenium_tests/reports/report.html
    expire_in: 7 days

# ================================================================
# deploy_to_synology —— 测试通过后部署到群晖 Docker
# 前提：Runner 需挂载 /var/run/docker.sock（Docker-out-of-Docker）
# ================================================================
deploy_to_synology:
  stage: deploy
  tags:
    - docker
    - nas
    - deploy
  needs:
    - job: flutter_build_web
      artifacts: true
    - job: selenium_tests
  before_script:
    - DOCKER="docker"
    - DOCKERFILE="Dockerfile.web.cn"
    - $DOCKER --version
  script:
    - |
      echo "=== 1. 清理旧容器 ==="
      $DOCKER stop ${DEPLOY_CONTAINER_NAME} 2>/dev/null || true
      $DOCKER rm ${DEPLOY_CONTAINER_NAME} 2>/dev/null || true
      $DOCKER stop ${DEPLOY_API_CONTAINER_NAME} 2>/dev/null || true
      $DOCKER rm ${DEPLOY_API_CONTAINER_NAME} 2>/dev/null || true

      echo "=== 2. 检查端口 $DEPLOY_PORT 占用 ==="
      PORT_PID=$($DOCKER ps --filter "publish=$DEPLOY_PORT" --format '{{.ID}}' 2>/dev/null)
      if [ -n "$PORT_PID" ]; then
        echo "端口 $DEPLOY_PORT 被容器 $PORT_PID 占用，正在清理..."
        $DOCKER stop $PORT_PID 2>/dev/null || true
        $DOCKER rm $PORT_PID 2>/dev/null || true
      else
        echo "端口 $DEPLOY_PORT 未被占用"
      fi

      echo "=== 3. 确保网络 $DEPLOY_NETWORK 存在 ==="
      $DOCKER network inspect $DEPLOY_NETWORK >/dev/null 2>&1 || $DOCKER network create $DEPLOY_NETWORK

      echo "=== 4. 清理旧镜像 ==="
      OLD_WEB_IMAGE=$($DOCKER images -q ${DEPLOY_CONTAINER_NAME}:latest 2>/dev/null)
      if [ -n "$OLD_WEB_IMAGE" ]; then
        echo "删除旧镜像 ${DEPLOY_CONTAINER_NAME}:latest ($OLD_WEB_IMAGE) ..."
        $DOCKER rmi -f $OLD_WEB_IMAGE 2>/dev/null || true
      fi

      echo "=== 6. 构建 Web 镜像 ==="
      $DOCKER build -f $DOCKERFILE -t ${DEPLOY_CONTAINER_NAME}:latest .

      echo "=== 7. 启动 API 容器 ==="
      if $DOCKER images -q ${DEPLOY_API_IMAGE} >/dev/null 2>&1; then
        echo "API 镜像存在，启动容器..."
        $DOCKER run -d \
          --name ${DEPLOY_API_CONTAINER_NAME} \
          --restart unless-stopped \
          --network $DEPLOY_NETWORK \
          --network-alias mobile_portainer-api \
          -e ADMIN_USER=${ADMIN_USER:-admin} \
          -e ADMIN_PASSWORD=${ADMIN_PASSWORD:-password} \
          -e IGNORED_EVENTS=${IGNORED_EVENTS:-exec_create,exec_start,exec_die} \
          -e HOST_FILESYSTEM_ROOT=/hostfs \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /volume2/docker/mobile_portainer/data:/app/data \
          -v /:/hostfs:ro \
          -v /proc:/hostfs/proc:ro \
          ${DEPLOY_API_IMAGE}
      else
        echo "警告：API 镜像 ${DEPLOY_API_IMAGE} 不存在，跳过 API 容器启动"
      fi

      echo "=== 8. 启动 Web 容器 ==="
      $DOCKER run -d \
        --name ${DEPLOY_CONTAINER_NAME} \
        --restart unless-stopped \
        --network $DEPLOY_NETWORK \
        -p ${DEPLOY_PORT}:80 \
        ${DEPLOY_CONTAINER_NAME}:latest

      echo "=== 部署完成！应用运行在 http://<synology-ip>:${DEPLOY_PORT} ==="
