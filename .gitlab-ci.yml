stages:
  - analyze
  - build
  - selenium

variables:
  FLUTTER_IMAGE: docker.1ms/cirrusci/flutter:stable
  # 以下路径变量不在 YAML 中硬编码，优先从 Runner config.toml 的 environment 或
  # GitLab 项目 Settings → CI/CD → Variables 读取。before_script 中的 foreach
  # 会自动检测常见路径作为兜底。
  # FLUTTER_ROOT: Flutter SDK 根目录，例如 D:\Path\flutter
  # HOS_SDK_HOME: HarmonyOS SDK 目录，例如 D:\Program Files\Huawei\DevEco Studio\sdk

# Shell executor 公共配置：UTF-8 编码修复 + Flutter PATH 自动检测
.shell_setup:
  before_script:
    - |
      chcp.com 65001 2>$null
      [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
      $OutputEncoding = [System.Text.Encoding]::UTF8
      $env:PUB_HOSTED_URL = "https://pub.flutter-io.cn"
      $env:FLUTTER_STORAGE_BASE_URL = "https://storage.flutter-io.cn"
      git config --global --add safe.directory "$CI_PROJECT_DIR"
      foreach ($p in @($env:FLUTTER_ROOT, 'C:\flutter', "$env:USERPROFILE\flutter", "$env:USERPROFILE\fvm\default")) { if ($p -and (Test-Path "$p\bin\flutter.bat")) { $env:Path = "$p\bin;$env:Path"; git config --global --add safe.directory $p; break } }
      # 设置 HarmonyOS/OpenHarmony SDK 路径，Flutter ohos 分支要求通过 config 或特定目录结构校验
      foreach ($p in @($env:OHOS_SDK_HOME, $env:OHOS_HOME, $env:HOS_SDK_HOME)) { if ($p -and (Test-Path $p)) { flutter config --ohos-sdk $p; break } }
      # HVIGOR_USER_HOME 不能包含空格，hvigor wrapper 内部调 npm 会失败
      if (-not (Test-Path 'C:\hvigor_home')) { New-Item -ItemType Directory -Path 'C:\hvigor_home' -Force *>$null }
      $env:HVIGOR_USER_HOME = 'C:\hvigor_home'
      # 用 8.3 短路径避开 D:\Program Files\nodejs 中的空格，确保 hvigor 能无空格调用 npm
      $npmPath = (Get-Command npm.cmd -ErrorAction SilentlyContinue).Source
      if ($npmPath) {
        $npmDir = Split-Path $npmPath -Parent
        # 获取短路径（8.3 格式），不含空格
        $shortNpmDir = (New-Object -ComObject Scripting.FileSystemObject).GetFolder($npmDir).ShortPath
        $env:Path = "$shortNpmDir;$env:Path"
      }

flutter_analyze:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: analyze
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter analyze --no-fatal-warnings --no-fatal-infos
    - flutter test

flutter_build_web:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: build
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter build web

# HarmonyOS HAR 构建需要 HarmonyOS SDK 和 DevEco Studio 工具链。
# Runner 需安装以下环境：
#   1. HarmonyOS SDK（通过 DevEco Studio 或命令行安装）
#   2. Node.js >= 18（hvigor 构建工具依赖）
#   3. ohpm（HarmonyOS 包管理器）
# 推荐为此作业配置独立的 shell executor runner 并打上 ohos 标签。
flutter_build_har:
  extends: .shell_setup
  image: ${FLUTTER_IMAGE}
  stage: build
  tags:
    - harmony
    - flutter
  script:
    - flutter pub get
    - flutter build har --release

selenium_tests:
  image: ${FLUTTER_IMAGE}
  stage: selenium
  tags:
    - harmony
    - flutter
  before_script:
    - flutter pub get
    - flutter build web
    # 安装 Chrome 浏览器
    - apt-get update -qq && apt-get install -y -qq wget gnupg ca-certificates
    - wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
    - echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
    - apt-get update -qq && apt-get install -y -qq google-chrome-stable
    # 安装 Python 测试依赖
    - cd selenium_tests
    - python3 -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
    - deactivate
    - cd ..
  script:
    # 后台启动 Web 服务
    - python3 -m http.server 8082 --directory build/web &
    - sleep 3
    # 运行 Selenium 测试
    - cd selenium_tests
    - source venv/bin/activate
    - TEST_BASE_URL=http://localhost:8082 pytest tests/ -v --html=report.html --self-contained-html
    - deactivate
  artifacts:
    when: always
    paths:
      - selenium_tests/report.html
    expire_in: 7 days
