name: Web Build on Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'

      - name: 安装依赖
        run: flutter pub get

      - name: 生成国际化文件
        run: flutter gen-l10n

      - name: 构建 Web
        run: flutter build web --release

      - name: 打包构建产物
        run: |
          cd build/web
          zip -r ../../web-build.zip .

      - name: 获取短 SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            ## Portable CE Flutter Web 构建

            - 提交: `${{ github.sha }}`
            - 分支: `${{ github.ref_name }}`

            将 `web-build.zip` 解压后部署到任意静态文件服务器即可使用。
          files: web-build.zip
          prerelease: true

      - name: 更新 latest 标签
        run: |
          git tag -f latest
          git push -f origin latest

      - name: 发布 Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            ## Portable CE Flutter Web 最新构建

            - 提交: `${{ github.sha }}`
            - 分支: `${{ github.ref_name }}`

            将 `web-build.zip` 解压后部署到任意静态文件服务器即可使用。
          files: web-build.zip
          prerelease: false
          make_latest: true
