name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FLUTTER_VERSION: '3.38.10'
  DEPLOY_CONTAINER_NAME: 'mobile-portainer-web'

jobs:
  # ================================================================
  # Stage 1: 静态分析 + 单元测试
  # ================================================================
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test || echo "No tests found or tests skipped"

  # ================================================================
  # Stage 2: Web 构建（供 Selenium 测试和 Docker 部署使用）
  # ================================================================
  build-web:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 1

  # ================================================================
  # Stage 3: Android APK 构建（测试通过后才构建）
  # ================================================================
  build-apk:
    needs: selenium
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Disable AAR metadata check
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/disable-aar-check.gradle << 'GRADLE'
          gradle.taskGraph.whenReady { taskGraph ->
              taskGraph.allTasks.each { task ->
                  if (task.name == 'checkReleaseAarMetadata' || task.name == 'checkDebugAarMetadata') {
                      task.enabled = false
                  }
              }
          }
          GRADLE

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/host/outputs/apk/release/app-release.apk
          retention-days: 7

  # ================================================================
  # Stage 3: macOS 桌面端 DMG（测试通过后才构建）
  # ================================================================
  build-macos:
    needs: selenium
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: x64
            build_cmd: arch -x86_64 flutter build macos --release
          - os: macos-15
            arch: arm64
            build_cmd: flutter build macos --release
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build macOS
        run: ${{ matrix.build_cmd }}

      - name: Package DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/mobile_portainer_flutter_module.app"
          DMG_NAME="mobile_portainer_flutter_module-${{ matrix.arch }}.dmg"
          mkdir -p dmg_staging
          cp -R "${APP_PATH}" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Mobile Portainer" \
            -srcfolder dmg_staging \
            -ov -format UDZO "${DMG_NAME}"
          rm -rf dmg_staging
          echo "DMG: ${DMG_NAME} ($(du -sh "${DMG_NAME}" | cut -f1))"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: mobile_portainer_flutter_module-${{ matrix.arch }}.dmg
          retention-days: 7

  # ================================================================
  # Stage 3: Windows 桌面端构建（x64 + ARM64）
  # ================================================================
  build-windows:
    needs: selenium
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            flutter-version: '3.38.10'
          - os: windows-11-arm
            arch: arm64
            flutter-version: '3.38.10'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          $src = "build/windows/${{ matrix.arch }}/runner/Release/*"
          Compress-Archive -Path $src -DestinationPath "mobile_portainer_flutter_module-windows-${{ matrix.arch }}.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: mobile_portainer_flutter_module-windows-${{ matrix.arch }}.zip
          retention-days: 7

  # ================================================================
  # Stage 3: Linux 桌面端构建（x64 + ARM64）
  # ================================================================
  build-linux:
    needs: selenium
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            flutter-version: '3.38.10'
          - os: ubuntu-24.04-arm
            arch: arm64
            flutter-version: '3.38.10'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd "build/linux/${{ matrix.arch }}/release/bundle"
          tar -czf "../../../../../mobile_portainer_flutter_module-linux-${{ matrix.arch }}.tar.gz" .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: mobile_portainer_flutter_module-linux-${{ matrix.arch }}.tar.gz
          retention-days: 7

  # ================================================================
  # Stage 3: iOS 构建
  # ================================================================
  build-ios:
    needs: selenium
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package iOS
        run: |
          cd build/ios/Release-iphoneos
          zip -r "../../mobile_portainer_flutter_module-ios.zip" Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/mobile_portainer_flutter_module-ios.zip
          retention-days: 7

  # ================================================================
  # Stage 4: Docker 构建 + 推送（所有测试和构建通过后）
  # ================================================================
  docker:
    needs: [build-web, selenium, build-apk, build-macos, build-windows, build-linux, build-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.DEPLOY_CONTAINER_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check Docker Hub credentials
        id: check-dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DH_USER" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check-dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (Docker Hub)
        if: steps.check-dockerhub.outputs.enabled == 'true'
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DEPLOY_CONTAINER_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Push to Docker Hub
        if: steps.check-dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha

  # ================================================================
  # Stage 2: Selenium E2E 测试
  # ================================================================
  selenium:
    needs: build-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Verify web build
        run: ls -la build/web/index.html

      - name: Pull Python image
        run: docker pull python:3.11-slim

      - name: Build app server image
        run: docker build -f Dockerfile.selenium --target app-server -t selenium_app .

      - name: Build test runner image
        run: docker build -f Dockerfile.selenium --target test-runner -t selenium_tests .

      - name: Start app server
        run: |
          docker rm -f selenium_app 2>/dev/null || true
          docker run -d --name selenium_app -p 9000:9000 selenium_app

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/info > /dev/null 2>&1 && echo "app ready" && exit 0
            echo "wait $i"
            sleep 1
          done
          echo "app failed to start" && exit 1

      - name: Run Selenium tests
        run: |
          mkdir -p selenium_tests/reports
          docker run --rm \
            --network container:selenium_app \
            -v ${{ github.workspace }}/selenium_tests/reports:/app/reports \
            -e TEST_BASE_URL=http://localhost:9000 \
            -e MOCK_BACKEND_URL=http://localhost:9000 \
            -e TEST_BROWSER=chrome \
            -e TEST_HEADLESS=true \
            -e CHROMIUM_BINARY=/usr/bin/chromium \
            -e CHROMEDRIVER_PATH=/usr/bin/chromedriver \
            selenium_tests sh -c "pytest tests/ -v --html=reports/report.html --self-contained-html"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: selenium_tests/reports/report.html
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker stop selenium_app && docker rm selenium_app
